name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render slides
        run: |
          for qmd in slides/*/L*.qmd; do
            dir=$(dirname "$qmd")
            quarto render "$qmd" --output-dir "$dir/_output"
          done

      - name: Assemble site
        run: |
          mkdir -p _site
          for dir in slides/*/; do
            name=$(basename "$dir")
            if [ -d "$dir/_output" ]; then
              cp -r "$dir/_output/." "_site/$name/"
            fi
          done
          cp slides/index.html _site/index.html 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
